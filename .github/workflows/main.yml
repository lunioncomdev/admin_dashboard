name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Validate required secrets
        run: |
          missing=()
          [ -z "${{ secrets.VPS_HOST }}"    ] && missing+=("VPS_HOST")
          [ -z "${{ secrets.VPS_USER }}"    ] && missing+=("VPS_USER")
          [ -z "${{ secrets.VPS_SSH_KEY }}" ] && missing+=("VPS_SSH_KEY")
          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error::Missing required secrets: ${missing[*]}"
            echo "Go to Settings → Secrets and variables → Actions and add the missing secrets."
            exit 1
          fi

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd /home/${{ secrets.VPS_USER }}/project_app
            git pull origin main
            docker compose up -d --build

